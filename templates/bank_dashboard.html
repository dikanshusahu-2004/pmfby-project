<!DOCTYPE html>
<html>
<head>
    <title>Bank Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }
        .card {
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="container mt-4">

<div class="card shadow p-4">

<h3 class="text-primary">🏦 Bank Payment Dashboard</h3>

<hr>

<!-- 🔥 YAHAN ADD KARO (SUMMARY CARDS) -->
<div class="row text-center">

<div class="col-md-4">
<div class="card bg-primary text-white p-3">
<h4>Total Claims</h4>
<h2>{{total}}</h2>
</div>
</div>

<div class="col-md-4">
<div class="card bg-warning p-3">
<h4>Pending</h4>
<h2>{{pending}}</h2>
</div>
</div>

<div class="col-md-4">
<div class="card bg-success text-white p-3">
<h4>Paid</h4>
<h2>{{paid}}</h2>
</div>
</div>

</div>

<hr>

<!-- 🔽 TABLE START -->
<table class="table table-bordered mt-3">

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Crop</th>
<th>Amount</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody>
{% for claim in claims %}
<tr>
<td>{{claim.id}}</td>
<td>{{claim.name}}</td>
<td>{{claim.crop_name}}</td>
<td>₹ {{claim.claim_amount}}</td>
<td>{{claim.bank_status}}</td>
<td>
<a href="/bank_view/{{claim.id}}" class="btn btn-primary btn-sm">View</a>
</td>
</tr>
{% endfor %}
</tbody>

</table>
 <a href="/transactions" class="btn btn-dark mb-3">
View Transaction History
</a>
</div>

</div>

</body>
</html>
