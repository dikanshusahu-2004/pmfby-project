<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

<div class="card p-4 shadow" style="width:400px;">
    <h4 class="text-center text-success mb-3">Farmer Registration</h4>

    <form method="POST">
        <input type="text" name="name" class="form-control mb-3" placeholder="Full Name" required>
        <input type="text" name="mobile" class="form-control mb-3" placeholder="Mobile Number" required>
        <input type="text" name="farmer_id" class="form-control mb-3" placeholder="Farmer ID" required>
        <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

        <button type="submit" class="btn btn-success w-100">Register</button>
    </form>

    <div class="text-center mt-3">
        Already have an account?
        <a href="/">Login</a>
    </div>
</div>

</body>
</html>
